<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="anmxlr — personal landing page">
    <title>anmxlr</title>
    <link rel="stylesheet" href="src/style.css">
</head>

<body>

    <!-- ── Intro Splash Screen ──────────────────────── -->
    <div class="intro-screen" id="intro-screen">
        <span class="intro-text">anmxlr</span>
    </div>

    <!-- ── Main Page ────────────────────────────────── -->
    <div class="main-page" id="main-page">

        <!-- Ambient glow orbs -->
        <div class="glow-orb glow-orb--primary"></div>
        <div class="glow-orb glow-orb--secondary"></div>

        <!-- Top Navigation Bar -->
        <nav class="top-bar" id="top-bar">
            <div class="logo">anmxlr</div>
            <a href="#" class="contact-btn" id="contact-btn">
                <span>Contact</span>
                <svg class="arrow-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 7h12M8 2l5 5-5 5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </a>
        </nav>

        <!-- Hero Section -->
        <section class="hero">
            <h1 class="hero-title">anmxlr</h1>
            <p class="hero-subtitle">Building things on the internet.</p>
        </section>

        <!-- Scroll Indicator -->
        <div class="scroll-indicator" id="scroll-indicator">
            <div class="scroll-line"></div>
            <span class="scroll-text">Scroll</span>
        </div>

        <!-- ── Footer ─────────────────────────────── -->
        <footer class="footer" id="footer">
            <div class="footer-divider"></div>
            <div class="footer-content">
                <div class="footer-left">
                    <span class="footer-logo">anmxlr</span>
                    <p class="footer-copyright">© 2026 Anmol Raj. All rights reserved.</p>
                </div>
                <div class="footer-right">
                    <span class="footer-heading">Contact</span>
                    <div class="footer-links">
                        <a href="mailto:anmxlr@gmail.com" class="footer-link">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <path d="M22 4l-10 8L2 4" />
                            </svg>
                            Email
                        </a>
                        <a href="https://github.com/anmxlr" target="_blank" rel="noopener" class="footer-link">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" />
                            </svg>
                            GitHub
                        </a>
                        <a href="https://x.com/anmxlr" target="_blank" rel="noopener" class="footer-link">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4l11.733 16H20L8.267 4H4zm0 16l6.768-6.768M20 4l-6.768 6.768" />
                            </svg>
                            X / Twitter
                        </a>
                    </div>
                </div>
            </div>
        </footer>

        <!-- Film grain texture overlay -->
        <div class="grain"></div>
    </div>

    <!-- ── Contact Modal ────────────────────────────── -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Get in touch</h2>
                <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
            </div>
            <div class="contact-links">

                <a href="mailto:anmxlr@gmail.com" class="contact-link">
                    <div class="contact-link-icon">
                        <svg viewBox="0 0 24 24">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <path d="M22 4l-10 8L2 4" />
                        </svg>
                    </div>
                    <div class="contact-link-info">
                        <span class="contact-link-label">Email</span>
                        <span class="contact-link-value">anmxlr@gmail.com</span>
                    </div>
                </a>

                <a href="https://github.com/anmxlr" target="_blank" rel="noopener" class="contact-link">
                    <div class="contact-link-icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" />
                        </svg>
                    </div>
                    <div class="contact-link-info">
                        <span class="contact-link-label">GitHub</span>
                        <span class="contact-link-value">@anmxlr</span>
                    </div>
                </a>

                <a href="https://x.com/anmxlr" target="_blank" rel="noopener" class="contact-link">
                    <div class="contact-link-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 4l11.733 16H20L8.267 4H4zm0 16l6.768-6.768M20 4l-6.768 6.768" />
                        </svg>
                    </div>
                    <div class="contact-link-info">
                        <span class="contact-link-label">X / Twitter</span>
                        <span class="contact-link-value">@anmxlr</span>
                    </div>
                </a>

            </div>
        </div>
    </div>

    <script src="src/main.js"></script>
</body>

</html>
